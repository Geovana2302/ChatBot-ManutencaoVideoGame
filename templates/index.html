<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Master - Suporte Técnico</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        :root {
            --bg-body: #0f172a;
            --bg-chat: #1e293b;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-bot: #e2e8f0;
        }

        body { background: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #1e293b; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 2px solid var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .bot-icon { background: var(--primary); color: white; padding: 10px; border-radius: 12px; display: flex; }
        h1 { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }

        #chat { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        
        /* Ajuste na classe msg para aceitar formatação */
        .msg { max-width: 85%; padding: 1rem; border-radius: 12px; line-height: 1.6; position: relative; animation: fadeIn 0.3s ease; font-size: 0.95rem; white-space: pre-wrap; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #334155; color: var(--text-bot); border-bottom-left-radius: 2px; border: 1px solid #475569; }

        /* Estilização interna dos tópicos */
        .msg strong { color: #fff; font-weight: 600; }
        .msg br { margin-bottom: 8px; }

        #suggestions { display: flex; gap: 0.7rem; padding: 0 2rem 1.5rem; flex-wrap: wrap; justify-content: center; }
        .chip { background: #334155; color: #cbd5e1; padding: 10px 18px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--primary); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .chip:hover { background: var(--primary); color: white; }

        #input-box { background: #1e293b; padding: 1.5rem 2rem; border-top: 1px solid #334155; display: flex; flex-direction: column; align-items: center; }
        .container { display: flex; gap: 0.8rem; width: 100%; max-width: 900px; background: #0f172a; padding: 8px; border-radius: 15px; border: 1px solid var(--primary); }
        
        input { flex: 1; background: transparent; border: none; padding: 0.8rem 1.2rem; outline: none; font-size: 1rem; color: white; }
        button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    </style>
</head>
<body>

<header>
    <div class="bot-icon"><i data-lucide="gamepad-2"></i></div>
    <h1>Console Repair AI</h1>
</header>

<div id="chat">
    <div class="msg bot">Bem-vindo à base de conhecimento de consoles! 🎮<br>Como posso ajudar você hoje?</div>
</div>

<div id="suggestions">
    <div class="chip" onclick="quickSend('Controle com Drift (analógico mexendo sozinho)')"><i data-lucide="joystick"></i> Drift no Analógico</div>
    <div class="chip" onclick="quickSend('Console desligando por superaquecimento')"><i data-lucide="thermometer-snowflake"></i> Superaquecimento</div>
    <div class="chip" onclick="quickSend('Não dá imagem no HDMI')"><i data-lucide="tv-2"></i> Erro de Imagem</div>
</div>

<div id="input-box">
    <div class="container">
        <input type="text" id="prompt" placeholder="Descreva o problema..." autocomplete="off">
        <button id="btn"><i data-lucide="send-horizontal"></i></button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('prompt');
    const btn = document.getElementById('btn');

    lucide.createIcons();

    // FUNÇÃO CORRIGIDA PARA FORMATAR TÓPICOS E REMOVER SÍMBOLOS
    const addMsg = (role, text) => {
        const el = document.createElement('div');
        el.className = `msg ${role}`;
        
        // 1. Transforma **texto** em negrito real
        // 2. Transforma * ou - no início de linhas em bullets (•)
        // 3. Garante que quebras de linha virem <br>
        let formattedText = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') 
            .replace(/^\s*[\*\-]\s+/gm, '• ') 
            .replace(/\n/g, '<br>');

        el.innerHTML = formattedText;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
    };

    const send = async (textOverride = null) => {
        const text = textOverride || input.value.trim();
        if (!text) return;

        addMsg('user', text);
        input.value = '';
        input.disabled = btn.disabled = true;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            addMsg('bot', data.reply);
        } catch {
            addMsg('bot', '⚠️ Erro ao acessar o servidor.');
        } finally {
            input.disabled = btn.disabled = false;
            input.focus();
        }
    };

    function quickSend(val) { send(val); }
    btn.addEventListener('click', () => send());
    input.addEventListener('keypress', e => e.key === 'Enter' && send());
</script>

</body>
</html>
